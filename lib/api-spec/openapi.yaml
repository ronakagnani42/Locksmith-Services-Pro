openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: iLocksmiths API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      description: Submit a contact/quote request form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactFormInput"
      responses:
        "201":
          description: Contact form submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactFormResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /inquiries:
    get:
      operationId: listInquiries
      tags: [contact]
      summary: List all inquiries
      description: Get all contact form inquiries
      responses:
        "200":
          description: List of inquiries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inquiry"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactFormInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        service:
          type: string
          enum:
            - emergency-lockout
            - lock-repair
            - upvc-door
            - security-upgrade
            - other
        message:
          type: string
        contactPreference:
          type: string
          enum:
            - phone
            - whatsapp
            - email
      required:
        - name
        - phone
        - email
        - service
        - message
        - contactPreference
    ContactFormResponse:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - message
        - createdAt
    Inquiry:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        service:
          type: string
        message:
          type: string
        contactPreference:
          type: string
        status:
          type: string
          enum:
            - new
            - in-progress
            - resolved
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - email
        - service
        - message
        - contactPreference
        - status
        - createdAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
      required:
        - error
